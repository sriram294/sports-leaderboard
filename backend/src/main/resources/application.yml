spring:
  application:
    name: playboard-backend
  autoconfigure:
    # We authenticate purely via our own JWTs (JwtAuthenticationFilter) —
    # without this, Spring Security auto-configures an in-memory user with a
    # random generated password that we never use.
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/playboard}
    username: ${DB_USERNAME:playboard}
    password: ${DB_PASSWORD:playboard}
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate only verifies entities match it.
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  # Railway (and most PaaS) inject the port to bind on via $PORT.
  port: ${PORT:8080}

playboard:
  web-origin: ${WEB_ORIGIN:http://localhost:5173}
  auth:
    # Web-application OAuth Client ID — must match the `serverClientId`
    # Android passes to GetGoogleIdOption, or the token's `aud` check fails.
    google-client-id: ${GOOGLE_CLIENT_ID}
    # HMAC signing secret for our own access/refresh JWTs. Must be at least
    # 32 bytes (256 bits) for HS256 — generate with e.g. `openssl rand -base64 32`.
    jwt-secret: ${JWT_SECRET}
  storage:
    # Local-disk avatar storage (dev/small-scale) — see AvatarStorageService.
    avatar-dir: ${AVATAR_STORAGE_DIR:./data/avatars}
    # Prefixed onto stored avatar paths so `photoUrl` is directly loadable by
    # the Android client. Must be the externally reachable origin of this API.
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  firebase:
    # Base64-encoded Firebase service-account JSON, used to send FCM push
    # notifications. Left blank in dev/tests — when blank, push is a logged
    # no-op (see FirebaseConfig / PushNotificationService). Encode the key with
    # e.g. `base64 -w0 service-account.json` and set it on Railway.
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}
  notifications:
    # End-of-session rank-change push (SessionRankChangeJob). A group's session is
    # considered over once no match has been logged for `session-quiet-period`; the
    # scan runs every `session-scan-interval` over groups that played within
    # `session-lookback`. Shorten the quiet period to test without waiting 90 minutes.
    session-quiet-period: ${PLAYBOARD_SESSION_QUIET_PERIOD:PT90M}
    session-scan-interval: ${PLAYBOARD_SESSION_SCAN_INTERVAL:PT15M}
    session-scan-initial-delay: ${PLAYBOARD_SESSION_SCAN_INITIAL_DELAY:PT2M}
    session-lookback: ${PLAYBOARD_SESSION_LOOKBACK:PT24H}
  trophies:
    # Monthly leaderboard crown (MonthlyTrophyJob). The job sweeps for *completed* months
    # that have no verdict yet, rather than firing on the 1st: this service sleeps on
    # Railway, so a month-boundary trigger would fire into a sleeping container and be lost.
    # A long interval is fine — the answer only changes once a month.
    scan-interval: ${PLAYBOARD_TROPHY_SCAN_INTERVAL:PT6H}
    scan-initial-delay: ${PLAYBOARD_TROPHY_SCAN_INITIAL_DELAY:PT3M}
    # Defines where a month starts and ends. Nothing in the schema stores a per-group
    # timezone, so the job owns the choice; the group plays in India, which has no DST.
    zone: ${PLAYBOARD_TROPHY_ZONE:Asia/Kolkata}
  update:
    debug:
      version-code: ${PLAYBOARD_UPDATE_DEBUG_VERSION_CODE:}
      version-name: ${PLAYBOARD_UPDATE_DEBUG_VERSION_NAME:}
      download-url: ${PLAYBOARD_UPDATE_DEBUG_DOWNLOAD_URL:}
